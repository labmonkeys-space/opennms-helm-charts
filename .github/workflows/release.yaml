name: release

# Tag-push triggers a release event. The tag's version tracks the umbrella's
# chart version (since the umbrella's strict-pinned matched-pair invariant
# makes it the natural release marker for the stack as a whole).
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# Both publish targets are written to: GitHub Pages (Helm repo) and GHCR (OCI).
# See RELEASING.md for the full operator playbook.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # chart-releaser-action: create Releases, push gh-pages
      packages: write    # helm push: GHCR OCI artifacts
      id-token: write    # reserved for future cosign keyless signing
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "GitHub Action"
          git config user.email "twiki@labmonkeys.space"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0

      # First-run bootstrap: chart-releaser-action requires a gh-pages branch
      # to already exist on the remote. On a brand-new repo it fails with
      # `fatal: invalid reference: origin/gh-pages` and the release dies. Push
      # an orphan empty commit as gh-pages if the branch is missing. Idempotent
      # — subsequent runs skip the push.
      - name: Bootstrap gh-pages branch if missing
        env:
          GIT_AUTHOR_NAME: GitHub Action
          GIT_AUTHOR_EMAIL: twiki@labmonkeys.space
          GIT_COMMITTER_NAME: GitHub Action
          GIT_COMMITTER_EMAIL: twiki@labmonkeys.space
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch exists; skipping bootstrap"
            exit 0
          fi
          echo "gh-pages branch missing; creating empty orphan ref"
          EMPTY_TREE=$(git hash-object -t tree --stdin </dev/null)
          BOOTSTRAP_COMMIT=$(git commit-tree "$EMPTY_TREE" -m "chore: initialize gh-pages branch")
          git push origin "$BOOTSTRAP_COMMIT:refs/heads/gh-pages"

      # GH Pages leg — packages every chart whose Chart.yaml version is not yet
      # published, creates GitHub Releases, attaches .tgz, updates index.yaml on
      # the gh-pages branch. The action handles helm-dep-update for the umbrella.
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f  # v1.7.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: charts

      # OCI leg — push every newly-packaged .tgz to GHCR. chart-releaser writes
      # only the deltas to .cr-release-packages/, so this is a no-op when no
      # version has changed (the for-loop iterates over zero files).
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push packaged charts to GHCR
        run: |
          set -eu
          shopt -s nullglob
          for tgz in .cr-release-packages/*.tgz; do
            echo "Pushing $tgz → oci://ghcr.io/${{ github.repository_owner }}/charts"
            helm push "$tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
          done
        shell: bash
