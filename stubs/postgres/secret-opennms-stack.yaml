---
# Two lab Secrets matching the CNPG-generated shape (`username`/`password`
# keys per role) that 0.3.0 charts consume by default. Used by
# `make dev-install-stack` / `dev-install-core` / `dev-install-sentinel`.
# This is for CI/lab-mode only.
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  namespace: default
  name: opennms-stack-pg-superuser
stringData:
  username: "postgres"
  password: "Change_Me_Postgres"
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  namespace: default
  name: opennms-stack-pg-app
stringData:
  username: "opennms_dba"
  password: "Change_Me_OpenNMS_DBA"
