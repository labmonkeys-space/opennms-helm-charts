---
# Combined Secret used by the opennms-stack umbrella in chart-testing. Carries
# all four credential keys our Core and Sentinel charts expect from a single
# `existingSecret` reference. This is for CI/lab-mode only.
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  namespace: default
  name: opennms-stack-pg
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "Change_Me_Postgres"
  OPENNMS_DBUSER: "opennms_dba"
  OPENNMS_DBPASS: "Change_Me_OpenNMS_DBA"
