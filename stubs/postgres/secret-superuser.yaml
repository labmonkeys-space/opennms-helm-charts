---
# CI / lab-mode ONLY — DO NOT USE IN PRODUCTION.
# Plaintext credentials applied by `make install-postgres` to bootstrap a
# CNPG-managed Postgres cluster for chart-testing. Production deployments
# generate Secrets out-of-band (Vault, ESO, sealed-secrets, etc.).
apiVersion: v1
kind: Secret
metadata:
  namespace: default
  name: cluster-superuser
type: kubernetes.io/basic-auth
stringData:
  username: "postgres"
  password: "Change_Me_Postgres"