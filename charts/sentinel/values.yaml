# Default values for sentinel.
# This is a YAML-formatted file.

# Sentinel is stateless flow processing — Deployment + optional HPA.
replicaCount: 1

# OpenNMS Sentinel image. image.tag defaults to the chart's appVersion.
image:
  repository: docker.io/opennms/sentinel
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Init container that envsubst-renders placeholder .cfg files into the
# etc-overlay before the runtime container starts.
configRenderer:
  image:
    repository: docker.io/alpine
    tag: "3.19"
    pullPolicy: IfNotPresent

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

selectorLabels:
  app.opennms.org/component: sentinel

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

# Sentinel exposes the Karaf shell SSH port (8301) and the optional JMX
# exporter port. There is no public HTTP surface — flow data flows in via
# Kafka and out via the Postgres datasource and Elasticsearch.
service:
  type: ClusterIP
  karaf:
    port: 8301

resources: {}

# Liveness and readiness probe the Karaf shell SSH port — comes up only after
# the Karaf runtime has finished starting.
livenessProbe:
  tcpSocket:
    port: karaf
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  tcpSocket:
    port: karaf
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6

# Sentinel scales horizontally with flow load. HPA is supported.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

# org.opennms.instance.id — must match Core, Minion, and any other Sentinels.
instanceId: OpenNMS

# Sentinel location identifier (registered with Core).
location: SENTINEL

# Additional JVM options appended to JAVA_OPTS.
javaOpts: ""

# Optional Prometheus JMX exporter agent loaded inside the Sentinel JVM.
prometheus:
  jmxExporter:
    enabled: false
    port: 9299

# Credentials for registering Sentinel with Core. The Sentinel container's `-c`
# entrypoint mode reads these env vars and persists them into the SCV keystore.
# Both Secrets MUST exist before install (the chart does not generate them).
opennms:
  http:
    # Secret keys: OPENNMS_HTTP_USER, OPENNMS_HTTP_PASS
    existingSecret: ""
  broker:
    # Secret keys: OPENNMS_BROKER_USER, OPENNMS_BROKER_PASS
    existingSecret: ""

# BYO Postgres for Sentinel's distributed datasource. Sentinel writes flow
# state to the same database Core uses. The chart NEVER deploys Postgres.
#
# `auth.existingSecret` SHOULD reference the same Secret used by Core so a
# single set of credentials covers both. Required keys:
#   OPENNMS_DBUSER, OPENNMS_DBPASS
postgresql:
  host: ""
  port: 5432
  database: opennms
  auth:
    existingSecret: ""

# BYO Kafka. The chart NEVER deploys Kafka. Renders
# org.opennms.core.ipc.sink.kafka.cfg into the etc-overlay.
kafka:
  bootstrapServers: ""
  auth:
    enabled: false
    # SCRAM-SHA-512 | SCRAM-SHA-256 | PLAIN | OAUTHBEARER
    mechanism: SCRAM-SHA-512
    # Secret keys: KAFKA_USERNAME, KAFKA_PASSWORD
    existingSecret: ""
  tls:
    enabled: false
    # Secret keys: ca.crt (and client.crt/client.key for mTLS)
    existingSecret: ""
  extraProperties: {}
    # compression.type: gzip

# BYO Elasticsearch — Sentinel's primary persistence target for flows. Enabled
# by default; disable only if running Sentinel without flow persistence.
elasticsearch:
  enabled: true
  url: ""
  indexStrategy: monthly
  connTimeout: 30000
  readTimeout: 30000
  replicas: 1
  auth:
    # Secret keys: ELASTIC_USERNAME, ELASTIC_PASSWORD
    existingSecret: ""

# Escape hatch: arbitrary additional .cfg / .properties files. Use the "__"
# delimiter in keys to encode subpaths under etc/ (decoded to "/" at pod start).
extraConfigFiles: {}
  # "org.opennms.example.cfg": |
  #   key=value
