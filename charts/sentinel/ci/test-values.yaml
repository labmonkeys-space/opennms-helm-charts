# Values for chart-testing (`ct install --charts charts/sentinel`).
#
# ct creates an ephemeral random namespace per release. Kubernetes Secret
# references cannot cross namespaces, so we cannot use the appSecret pattern
# in standalone ct testing — the Secret would live in `default` but the pod
# would live in the random namespace.
#
# In 0.3.0, standalone Sentinel without an appSecret fails fast (no lab-mode
# fall-through outside the opennms-stack umbrella). To keep this smoke test
# functional we leave `postgresql.host` empty so Sentinel skips the
# datasource.cfg render and its Postgres env-var projection entirely. Karaf
# still boots and the karaf-port smoke test passes. End-to-end Postgres
# connectivity is exercised by the umbrella test-values.

# postgresql.host intentionally unset — see header comment.
kafka:
  bootstrapServers: kafka.default.svc.cluster.local:9092
elasticsearch:
  url: http://elasticsearch.default.svc.cluster.local:9200
  # enableForwarding defaults to true; flip to false here to exercise the
  # cfg-line variant.
  enableForwarding: false
