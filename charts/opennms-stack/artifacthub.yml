  artifacthub.io/changes: |
    - kind: changed
      description: "BREAKING — global.postgresql.auth.existingSecret replaced by superuserSecret and appSecret blocks with operator-configurable key names. See the README upgrade notes."
    - kind: added
      description: sentinel.elasticsearch.enableForwarding (default true) — explicit master switch rendered into the flow-persistence cfg.
