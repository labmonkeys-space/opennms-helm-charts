      description: core.elasticsearch gains replicas, connTimeout, readTimeout, and enableForwarding for parity with Sentinel's surface.
    - kind: changed
      description: Lab-mode now renders two release-scoped CNPG-shaped Secrets (<release>-opennms-pg-superuser and <release>-opennms-pg-app) instead of one combined Secret.
