# Default values for opennms-stack umbrella.
# This is a YAML-formatted file.
#
# The umbrella exposes a `global.*` block whose values flow into both
# subcharts. Each subchart's own values can still be overridden under the
# top-level `core:` or `sentinel:` keys.

# Shared values consumed by the core and sentinel subcharts.
global:
  # Marker indicating Sentinel is installed under the opennms-stack umbrella.
  # When true, Sentinel's appSecret resolution falls through to Core's
  # lab-mode Secret (<release>-opennms-pg-app) when no operator Secret is set.
  # Standalone Sentinel installs do not set this; the chart fails fast.
  opennmsStack: true

  # org.opennms.instance.id — must match across Core, Sentinel, and any
  # Minions (which install separately).
  instanceId: OpenNMS

  # BYO Postgres. The umbrella NEVER deploys Postgres.
  # Both Core and Sentinel read from this block.
  #
  # Two independent Secrets — superuser (Core only) and app (Core + Sentinel).
  # Each defaults to the CNPG-shaped key names (`username` / `password`);
  # override `userKey` / `passwordKey` if your Secrets use other key names.
  #
  # Lab-mode: each Secret name field independently triggers Core to render
  # a chart-managed Secret (`<release>-opennms-pg-superuser` and
  # `<release>-opennms-pg-app`) when left empty — letting operators migrate
  # one role at a time. Sentinel inherits the app Secret automatically.
  postgresql:
    host: ""
    port: 5432
    database: opennms
    auth:
      superuserSecret:
        name: ""
        userKey: username
        passwordKey: password
      appSecret:
        name: ""
        userKey: username
        passwordKey: password

  # BYO Kafka.
  kafka:
    bootstrapServers: ""

  # BYO Elasticsearch (used by Sentinel).
  elasticsearch:
    url: ""
    auth:
      existingSecret: ""

# OpenNMS Horizon Core overrides. See charts/core/values.yaml for the full
# values surface; anything set here overrides the subchart defaults but is
# still subject to global.* fall-through for shared keys.
#
# Example overrides:
#   core:
#     persistence:
#       size: 200Gi
#     resources:
#       requests:
#         cpu: 500m
#         memory: 4Gi
#     prometheusRemoteWriter:
#       enabled: true
#       writeUrl: https://mimir.example/api/v1/push
core: {}

# OpenNMS Sentinel overrides. See charts/sentinel/values.yaml.
#
# Example overrides:
#   sentinel:
#     replicaCount: 3
#     autoscaling:
#       enabled: true
#       minReplicas: 2
#       maxReplicas: 8
#     opennms:
#       http:
#         existingSecret: opennms-http
sentinel: {}
