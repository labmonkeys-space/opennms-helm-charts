# Values for chart-testing (`ct install --charts charts/opennms-stack`).
#
# ct creates an ephemeral random namespace per release. Kubernetes Secret
# references cannot cross namespaces, so operator-supplied Secrets in
# `default` are not reachable from the random ct namespace.
#
# This test exercises the umbrella lab-mode end-to-end: Core renders two
# lab-mode Secrets (<release>-opennms-pg-superuser and <release>-opennms-pg-app),
# and Sentinel falls through to <release>-opennms-pg-app for its appSecret.
# Both subcharts render their full configs and Karaf boots in both pods.
#
# Operator-supplied Secret paths (CNPG-shaped Secrets with userKey/
# passwordKey overrides) are exercised by helm-template tests in CI.

global:
  postgresql:
    host: cluster-helm-lint-rw.default.svc.cluster.local
    # superuserSecret.name and appSecret.name left empty — lab-mode.
  kafka:
    bootstrapServers: kafka.default.svc.cluster.local:9092
  elasticsearch:
    url: http://elasticsearch.default.svc.cluster.local:9200

core:
  postgresql:
    auth:
      # Lab-mode credentials matching the CNPG superuser/db set up by
      # `make install-postgres`. These become the `username` / `password`
      # entries of the rendered lab-mode Secrets.
      superuserName: postgres
      superuserPassword: Change_Me_Postgres
      username: opennms_dba
      password: Change_Me_OpenNMS_DBA
  # Skip the 50Gi PVC in kind — no default storage class.
  persistence:
    enabled: false
  # Exercise the daemon-re-enable path through the umbrella's sub-values.
  # Chart default is `daemons.ackd.enabled: false`; this flip back to `true`
  # mirrors charts/core/ci/test-values.yaml.
  daemons:
    ackd:
      enabled: true

sentinel:
  replicaCount: 1
  # No HTTP/broker existingSecret → Sentinel starts in `-f` mode (no SCV
  # registration). Sufficient for the karaf-port smoke test.
  # Sentinel inherits global.postgresql and falls through to Core's lab-mode
  # app Secret automatically via the umbrella context (.Values.global is set).
