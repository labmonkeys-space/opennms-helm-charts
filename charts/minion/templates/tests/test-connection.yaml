apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "minion.fullname" . }}-test-connection"
  labels:
    {{- include "minion.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: nc
      image: busybox
      command: ["sh", "-c"]
      args:
        - |
          set -e
          # Smoke-test that the Karaf shell SSH port is reachable.
          nc -z -w5 {{ include "minion.fullname" . }} {{ .Values.service.karaf.port }}
