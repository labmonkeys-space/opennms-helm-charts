---
# Empty confd YAML overlay. Mounted at /opt/minion/minion-config.yaml so the
# upstream entrypoint's processConfdTemplates step has a valid file to read.
# The chart's etc-overlay (rendered by the envsubst init) overwrites whatever
# confd produces.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "minion.fullname" . }}-confd-overlay
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minion.labels" . | nindent 4 }}
data:
  minion-config.yaml: |
    {}
