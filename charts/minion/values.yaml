# Default values for minion.
# This is a YAML-formatted file.

# Minion deploys as a StatefulSet with stable per-pod IDs (no HPA). Default to
# one replica; for redundancy at one location, set replicaCount to 2 or 3.
replicaCount: 1

# OpenNMS Minion image. image.tag defaults to the chart's appVersion.
image:
  repository: docker.io/opennms/minion
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Init container that envsubst-renders placeholder .cfg files into the
# etc-overlay before the runtime container starts.
configRenderer:
  image:
    repository: docker.io/alpine
    tag: "3.19"
    pullPolicy: IfNotPresent

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

# Minion exposes the Karaf shell SSH port (8201) and the optional JMX exporter
# port. There is no public HTTP surface — the Minion talks to Core via Kafka.
service:
  type: ClusterIP
  karaf:
    port: 8201

resources: {}

livenessProbe:
  tcpSocket:
    port: karaf
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  tcpSocket:
    port: karaf
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6

# Per-replica persistent state for Karaf bundle cache and Minion working data.
# Disable only if your storage class doesn't support per-pod PVCs and you can
# accept rebuilding bundle cache on every pod restart.
persistence:
  enabled: true
  storageClassName: ""
  size: 1Gi
  accessMode: ReadWriteOnce
  annotations: {}

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

# org.opennms.instance.id — must match Core, Sentinel, and any other Minions.
instanceId: OpenNMS

# Location identifier registered with Core. Each remote site typically gets
# its own Helm release with a distinct location value (e.g., nyc, fra, sjc).
location: ""

# Additional JVM options appended to JAVA_OPTS.
javaOpts: ""

# Optional Prometheus JMX exporter agent loaded inside the Minion JVM.
prometheus:
  jmxExporter:
    enabled: false
    port: 9299

# Credentials Minion uses to register with Core. The container's `-c` startup
# mode reads these env vars and persists them into the SCV keystore. Both
# Secrets MUST exist before install.
opennms:
  http:
    # Secret keys: OPENNMS_HTTP_USER, OPENNMS_HTTP_PASS
    existingSecret: ""
  broker:
    # Secret keys: OPENNMS_BROKER_USER, OPENNMS_BROKER_PASS
    existingSecret: ""

# BYO Kafka. The chart NEVER deploys Kafka. Renders all three of
# org.opennms.core.ipc.{sink,rpc,twin}.kafka.cfg into the etc-overlay along
# with the four kafka-*.boot files that select the Kafka strategy at boot.
kafka:
  bootstrapServers: ""
  auth:
    enabled: false
    # SCRAM-SHA-512 | SCRAM-SHA-256 | PLAIN | OAUTHBEARER
    mechanism: SCRAM-SHA-512
    # Secret keys: KAFKA_USERNAME, KAFKA_PASSWORD
    existingSecret: ""
  tls:
    enabled: false
    # Secret keys: ca.crt (and client.crt/client.key for mTLS)
    existingSecret: ""
  extraProperties: {}
    # compression.type: gzip

# Escape hatch: arbitrary additional .cfg / .properties files. Use the "__"
# delimiter in keys to encode subpaths under etc/ (decoded to "/" at pod start).
extraConfigFiles: {}
  # "org.opennms.example.cfg": |
  #   key=value
