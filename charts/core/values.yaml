# Default values for core.
# This is a YAML-formatted file.

# OpenNMS Horizon Core image.
# image.tag defaults to the chart's appVersion. Override only for development
# (e.g. `--set image.tag=bleeding`).
image:
  repository: docker.io/opennms/horizon
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Init container that envsubst-renders placeholder .cfg files into the
# etc-overlay before the runtime container starts. Default: alpine:3.19 with
# `apk add gettext` at startup.
configRenderer:
  image:
    repository: docker.io/alpine
    tag: "3.19"
    pullPolicy: IfNotPresent

serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials.
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use. If not set and create is true,
  # a name is generated using the fullname template.
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

# Service exposes the WebUI (HTTP) and Karaf shell (SSH).
service:
  type: ClusterIP
  port: 8980
  webui:
    port: 8980
  karaf:
    port: 8101

# Optional Ingress for the WebUI.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Optional Gateway-API HTTPRoute for the WebUI.
# Requires Gateway API resources and a controller installed in the cluster
# (see https://gateway-api.sigs.k8s.io/guides/).
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

# Persistent storage for /opennms-data (RRD time-series, MIBs, generated reports).
# Disable only if your time-series backend is external AND you do not need
# persistent MIBs/reports.
persistence:
  enabled: true
  storageClassName: ""
  size: 50Gi
  accessMode: ReadWriteOnce
  annotations: {}

resources: {}

# Liveness uses tcpSocket on the webui port — fails if the JVM is dead OR has
# dropped its WebUI listener. Readiness uses login.jsp until /opennms/rest/health
# can be wired with credentials in a future chart version.
livenessProbe:
  tcpSocket:
    port: webui
  initialDelaySeconds: 90
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  httpGet:
    port: webui
    path: /opennms/login.jsp
  initialDelaySeconds: 90
  timeoutSeconds: 3
  failureThreshold: 20
  periodSeconds: 5

# Core is a singleton service and is not horizontally scaled. The autoscaling
# block is retained for compatibility but disabled.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# Additional volumes mounted into the runtime container.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the runtime container.
volumeMounts: []
# - name: foo
#   mountPath: /etc/foo
#   readOnly: true

nodeSelector: {}
tolerations: []
affinity: {}

# Container time zone.
timezone: UTC

# org.opennms.instance.id — queue/topic prefix shared by Core, Sentinel, and
# Minion. Must match across all three components to see each other's messages.
instanceId: OpenNMS

# Time-series strategy. "rrd" writes to /opennms-data/rrd. To offload time-series
# data to a Prometheus-compatible store (Cortex, Mimir, VictoriaMetrics, Thanos)
# enable `prometheusRemoteWriter` below — the chart will switch the strategy to
# "integration" automatically.
timeseriesStrategy: rrd

# BYO Prometheus-compatible time-series backend via the
# opennms-forge/prometheus-remote-writer plugin. When enabled, the chart:
#   1. Downloads the published KAR into /opt/opennms/deploy at pod start.
#   2. Renders org.opennms.plugins.tss.prometheus-remote-writer.cfg with the
#      configured write/read URLs and optional auth.
#   3. Sets org.opennms.timeseries.strategy = integration in
#      opennms.properties.d/timeseries.properties.
#
# Requires Horizon Core 35+. See:
#   https://github.com/opennms-forge/prometheus-remote-writer
#
# When `auth.existingSecret` is set, the Secret MUST contain keys:
#   PRW_USERNAME, PRW_PASSWORD
prometheusRemoteWriter:
  enabled: false
  # KAR version to install. Sets the default download URL on GitHub Releases.
  version: "0.3.2"
  kar:
    # Override to point at an internal mirror for air-gapped environments.
    # Leave empty to construct the default URL from `version`.
    url: ""
  writeUrl: ""
  readUrl: ""
  auth:
    existingSecret: ""

# Additional JVM options appended to JAVA_OPTS.
javaOpts: ""

# Optional Prometheus JMX exporter agent loaded inside the OpenNMS JVM.
prometheus:
  jmxExporter:
    enabled: false
    port: 9299

# BYO Postgres. This chart NEVER deploys Postgres.
#
# Credentials are projected from two independent Kubernetes Secrets:
#   - superuserSecret: used by Core at schema bootstrap and at runtime to
#     project POSTGRES_USER and POSTGRES_PASSWORD.
#   - appSecret: used by Core at runtime to project OPENNMS_DBUSER and
#     OPENNMS_DBPASS (Sentinel also reads this one when installed).
#
# Each block defaults to the CNPG-generated Secret shape (keys `username` and
# `password`). Override userKey / passwordKey if your Secret uses different
# key names (e.g. the legacy `POSTGRES_USER` / `POSTGRES_PASSWORD` shape).
#
# Lab-mode renders Secrets `<release>-opennms-pg-superuser` and
# `<release>-opennms-pg-app` (release-scoped so Sentinel under the umbrella
# inherits them automatically). The two lab-mode renders are **independent**:
# each fires only when its corresponding `<role>Secret.name` is empty. This
# lets you migrate one role at a time (e.g. set `appSecret.name` first while
# `superuserSecret` still uses the inline lab default). Used by
# `make test-install-core` against a kind-CNPG cluster; NOT for production.
#
# `host` MUST be set explicitly (no default) — the chart fails at template
# time if unset. CI test values set this to the CNPG service name.
postgresql:
  host: ""
  port: 5432
  database: opennms
  auth:
    # Superuser credentials. CNPG generates a Secret per cluster named
    # `<cluster>-superuser` with keys `username` / `password`.
    superuserSecret:
      name: ""
      userKey: username
      passwordKey: password
    # Application-role credentials. CNPG generates a Secret per database role
    # with the same `username` / `password` key shape.
    appSecret:
      name: ""
      userKey: username
      passwordKey: password
    # Inline lab-mode values — used only when both superuserSecret.name and
    # appSecret.name are empty. Each renders into one of the two lab-mode
    # Secrets above.
    superuserName: postgres
    superuserPassword: "Change_Me_Postgres"
    username: opennms_dba
    password: "Change_Me_OpenNMS_DBA"

# BYO Kafka. This chart NEVER deploys Kafka.
#
# Renders Kafka client properties into opennms.properties.d/kafka-ipc.properties
# with the `org.opennms.core.ipc.kafka.` prefix. OnmsKafkaConfigProvider strips
# the prefix and hands the rest to the Kafka client (Core reads IPC config from
# system properties, not Karaf ConfigAdmin .cfg files).
# When `auth.enabled` is true, the chart references `auth.existingSecret`
# whose keys MUST be: KAFKA_USERNAME, KAFKA_PASSWORD.
# When `tls.enabled` is true, `tls.existingSecret` must contain `ca.crt`
# (and `client.crt` + `client.key` for mTLS).
kafka:
  bootstrapServers: ""
  auth:
    enabled: false
    # SCRAM-SHA-512 | SCRAM-SHA-256 | PLAIN | OAUTHBEARER
    mechanism: SCRAM-SHA-512
    existingSecret: ""
  tls:
    enabled: false
    existingSecret: ""
  # Passthrough Kafka client properties prefixed with org.opennms.core.ipc.kafka.
  # in opennms.properties.d/kafka-ipc.properties.
  extraProperties: {}
    # compression.type: gzip
    # request.timeout.ms: "30000"

# BYO Elasticsearch (optional for Core). When enabled, Core's flow persistence
# writes to the configured cluster. In typical deployments Sentinel handles
# flow persistence; only set this if your Core directly persists flows.
#
# Surface mirrors Sentinel's flow-persistence block so the rendered
# org.opennms.features.flows.persistence.elastic.cfg has identical shape
# across both components.
elasticsearch:
  enabled: false
  url: ""
  indexStrategy: monthly
  # number_of_replicas applied to flow indices at creation.
  replicas: 1
  # Connection/read timeouts (ms) for the JEST client.
  connTimeout: 30000
  readTimeout: 30000
  # Master switch: false renders the cfg with `enableForwarding=false`,
  # which tells OpenNMS to skip the persistence step despite the cfg
  # being present. Set to false for debug scenarios where you want the
  # cfg rendered but no traffic to ES.
  enableForwarding: true
  auth:
    # Secret must contain keys: ELASTIC_USERNAME, ELASTIC_PASSWORD
    existingSecret: ""

# Per-daemon enable/disable. Upstream service-configuration.xml wraps every
# Core daemon's `enabled` attribute in ${env:CORE_SERVICE_<NAME>_ENABLED|<default>},
# so flipping `enabled` here projects the matching env var into both
# Core containers — no XML editing, no extra init containers.
#
# Unknown short names fail `helm template` with a clear error listing the
# whitelist. Adding the next daemon: append one entry to
# `core.daemonsEnvWhitelist` in _helpers.tpl AND one entry below. The current
# whitelist holds only `ackd`; expand as operators ask for it.
#
# `ackd` defaults to `false`: the Acknowledgement Daemon is on the upstream
# deprecation track and is not used by most deployments. Operators who rely on
# alarm acknowledgement workflows that depend on Ackd should set
# `daemons.ackd.enabled: true` here.
daemons:
  ackd:
    enabled: false

# Escape hatch: arbitrary additional .cfg / .properties files written into
# the etc-overlay alongside chart-managed files. Keys are natural POSIX paths
# *relative to etc/*; subdirectories work as you'd expect.
extraConfigFiles: {}
  # "org.opennms.example.cfg": |
  #   key=value
  # "opennms.properties.d/custom.properties": |
  #   org.opennms.custom = some-value
