# Values for chart-testing (`ct install --charts charts/core`).
# Targets the in-cluster CNPG Postgres set up by `make install-postgres`.

# Disable the 50Gi PVC in kind — no default storage class.
persistence:
  enabled: false

# Point at the CNPG-managed Postgres set up by `make install-postgres`.
# Lab-mode: superuserSecret and appSecret names are left empty, so the chart
# renders <release>-opennms-pg-superuser and <release>-opennms-pg-app from
# the inline credentials in values.yaml. The operator-supplied path
# (CNPG-shaped Secrets with userKey/passwordKey overrides) is exercised by
# helm-template tests; ct's ephemeral namespace prevents cross-namespace
# Secret refs here.
postgresql:
  host: cluster-helm-lint-rw.default.svc.cluster.local

# No Kafka in this Core-only test — bootstrap.servers stays empty so the
# chart skips rendering Kafka cfg files. Core boots and its WebUI reaches
# readiness; Kafka-using features will error in logs but won't block the
# install or the wget smoke test.
