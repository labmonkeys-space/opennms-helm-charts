{{- /*
Web UI admin Secret. Rendered ONLY when webAdmin.enabled is true AND no
operator-supplied webAdmin.existingSecret is set. The password is generated
once and preserved across upgrades via `lookup`: if the Secret already exists
on the cluster its current password is reused, so `helm upgrade` and re-runs
never rotate it (bootstrap-seed semantics — see design.md D2).

NOTE: `lookup` returns empty during `helm template` / client-side dry-run, so a
fresh random password is rendered off-cluster. This is expected; on a real
`helm install`/`upgrade` (and under `helmfile`) the value is stable.
*/ -}}
{{- if and .Values.webAdmin.enabled (include "core.webAdminLabMode" .) }}
{{- $name := include "core.webAdminSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $password := "" -}}
{{- if and $existing $existing.data (hasKey $existing.data "password") -}}
{{- $password = index $existing.data "password" | b64dec -}}
{{- else -}}
{{- $password = randAlphaNum (int .Values.webAdmin.passwordLength) -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "core.labels" . | nindent 4 }}
data:
  username: {{ .Values.webAdmin.username | b64enc | quote }}
  password: {{ $password | b64enc | quote }}
{{- end }}
