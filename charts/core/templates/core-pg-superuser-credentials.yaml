{{- /*
Lab-mode superuser Secret. Rendered ONLY when no operator-supplied
`postgresql.auth.superuserSecret.name` is set (neither globally nor on the
Core subchart). Keys match the CNPG-generated Secret shape so the chart's
default helpers consume them transparently.

In production deployments, set `postgresql.auth.superuserSecret.name` to a
Secret you manage out-of-band (or via an external-secrets controller).
*/ -}}
{{- if include "core.postgresSuperuserLabMode" . }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  # Release-scoped name (not chart-scoped) so Sentinel under the umbrella
  # can synthesise the same name from .Release.Name alone, without needing
  # to replicate Core's fullname logic.
  name: {{ printf "%s-opennms-pg-superuser" .Release.Name | trunc 63 | trimSuffix "-" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "core.labels" . | nindent 4 }}
data:
  username: {{ .Values.postgresql.auth.superuserName | b64enc | quote }}
  password: {{ .Values.postgresql.auth.superuserPassword | b64enc | quote }}
{{- end }}
