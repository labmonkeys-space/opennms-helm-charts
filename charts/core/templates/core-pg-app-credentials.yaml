{{- /*
Lab-mode application-role Secret. Rendered ONLY when no operator-supplied
`postgresql.auth.appSecret.name` is set (neither globally nor on the Core
subchart). Keys match the CNPG-generated Secret shape so the chart's default
helpers consume them transparently.

Under the opennms-stack umbrella, Sentinel falls through to this Secret name
(`<core-fullname>-pg-app`) when no operator Secret is supplied, so a single
lab-mode render covers both Core and Sentinel.
*/ -}}
{{- if include "core.postgresAppLabMode" . }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  # Release-scoped name (not chart-scoped) so Sentinel under the umbrella
  # can synthesise the same name from .Release.Name alone, without needing
  # to replicate Core's fullname logic.
  name: {{ .Release.Name }}-opennms-pg-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "core.labels" . | nindent 4 }}
data:
  username: {{ .Values.postgresql.auth.username | b64enc | quote }}
  password: {{ .Values.postgresql.auth.password | b64enc | quote }}
{{- end }}
