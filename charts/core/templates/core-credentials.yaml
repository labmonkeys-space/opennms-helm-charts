{{- /*
Lab-mode Secret rendered ONLY when the user has not provided an existingSecret.
In production deployments, set `postgresql.auth.existingSecret` to reference a
Secret you manage out-of-band (or via an external-secrets controller). The
expected keys are: POSTGRES_USER, POSTGRES_PASSWORD, OPENNMS_DBUSER, OPENNMS_DBPASS.
*/ -}}
{{- $existing := include "core.postgresExistingSecret" . -}}
{{- if not $existing }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "core.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "core.labels" . | nindent 4 }}
data:
  POSTGRES_USER: {{ .Values.postgresql.auth.superuserName | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.superuserPassword | b64enc | quote }}
  OPENNMS_DBUSER: {{ .Values.postgresql.auth.username | b64enc | quote }}
  OPENNMS_DBPASS: {{ .Values.postgresql.auth.password | b64enc | quote }}
{{- end }}
